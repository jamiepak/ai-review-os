<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>评审会议管理</title>
<style>
:root { --primary:#722ed1; --primary-light:#f9f0ff; --primary-dark:#531dab; --success:#52c41a; --success-bg:#f6ffed; --warning:#faad14; --warning-bg:#fffbe6; --danger:#ff4d4f; --danger-bg:#fff2f0; --bg:#f7f5fa; --card:#fff; --text:#1f1f1f; --text2:#666; --text3:#999; --border:#e8e8e8; --radius:12px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:linear-gradient(135deg,#531dab,#9254de); padding:16px 20px; color:#fff; }
.header h1 { font-size:16px; font-weight:600; }
.header p { font-size:11px; opacity:.85; margin-top:2px; }
.container { padding:16px; max-width:520px; margin:0 auto; }
.tab-bar { display:flex; margin-bottom:16px; border-radius:8px; overflow:hidden; border:1px solid var(--border); background:#fff; }
.tab-item { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:13px; font-weight:500; background:#fafafa; color:var(--text2); border:none; }
.tab-item.active { background:var(--primary); color:#fff; }
.tab-item .badge { display:inline-block; font-size:11px; padding:1px 6px; border-radius:10px; margin-left:4px; }
.tab-item.active .badge { background:rgba(255,255,255,.3); }
.tab-item:not(.active) .badge { background:var(--primary-light); color:var(--primary); }

.meeting-card { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.06); border-left:3px solid transparent; }
.meeting-card.scheduled { border-left-color:var(--primary); }
.meeting-card.ended { border-left-color:var(--warning); }
.meeting-card.archived { border-left-color:var(--success); }
.meeting-card.cancelled { border-left-color:var(--border); opacity:.6; }

.meeting-card .title { font-size:15px; font-weight:600; margin-bottom:6px; }
.meeting-card .meta { font-size:12px; color:var(--text3); line-height:1.8; }
.meeting-card .meta span { margin-right:10px; }
.meeting-card .tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px; margin-top:6px; }
.tag-scheduled { background:var(--primary-light); color:var(--primary); }
.tag-ended { background:var(--warning-bg); color:var(--warning); }
.tag-archived { background:var(--success-bg); color:var(--success); }
.tag-cancelled { background:#f5f5f5; color:var(--text3); }

.story-list { margin-top:10px; padding-top:10px; border-top:1px solid #f0f0f0; }
.story-item { font-size:12px; color:var(--text2); padding:4px 0; display:flex; gap:6px; }
.story-item .name { font-weight:500; color:var(--text); }

.actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.btn { padding:7px 14px; border:none; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; }
.btn-sm { padding:5px 10px; font-size:11px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
.btn-danger { background:transparent; border:1px solid var(--danger); color:var(--danger); }

.empty-state { text-align:center; padding:48px 20px; color:var(--text3); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.loading { text-align:center; padding:32px; color:var(--text3); }

.toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.78); color:#fff; padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; pointer-events:none; animation:fadeInOut 2.5s ease; }
@keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{opacity:0} }

.confirm-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); z-index:400; display:flex; align-items:center; justify-content:center; }
.confirm-box { background:#fff; border-radius:14px; padding:24px 20px; width:300px; text-align:center; }
.confirm-box .title { font-size:16px; font-weight:600; margin-bottom:8px; }
.confirm-box .msg { font-size:14px; color:var(--text2); margin-bottom:20px; }
.confirm-box .btns { display:flex; gap:10px; }
.confirm-box .btns .btn { flex:1; padding:10px; font-size:14px; }

/* Edit dialog */
.edit-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); z-index:400; display:flex; align-items:center; justify-content:center; }
.edit-sheet { background:#fff; border-radius:14px; padding:24px 20px; width:90%; max-width:420px; max-height:80vh; overflow-y:auto; }
.edit-sheet .title { font-size:16px; font-weight:600; margin-bottom:16px; }
.edit-sheet .form-group { margin-bottom:14px; }
.edit-sheet .form-label { font-size:13px; color:var(--text2); margin-bottom:6px; display:block; }
.edit-sheet input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fafafa; outline:none; }
.edit-sheet input:focus { border-color:var(--primary); background:#fff; }
.edit-sheet .btns { display:flex; gap:10px; margin-top:16px; }
.edit-sheet .btns .btn { flex:1; padding:12px; font-size:14px; text-align:center; }
</style>
</head>
<body>

<div class="header" style="display:flex;align-items:center;justify-content:space-between;">
  <div>
    <h1>📅 评审会议管理</h1>
    <p>预约 · 修改 · 取消 · 报名</p>
  </div>
  <a href="review-app-v2.html" style="color:rgba(255,255,255,.9);font-size:12px;text-decoration:none;background:rgba(255,255,255,.18);padding:5px 10px;border-radius:6px;white-space:nowrap;">报名评审</a>
</div>
<div class="container">
  <!-- 跳转到预约会议 -->
  <div style="margin-bottom:12px;">
    <a href="javascript:void(0)" onclick="openScheduleDialog()" style="display:flex;align-items:center;justify-content:space-between;background:var(--primary-light);border:1px solid #d3adf7;border-radius:var(--radius);padding:12px 16px;text-decoration:none;color:var(--primary);box-shadow:0 1px 3px rgba(114,46,209,.08);">
      <span style="font-size:14px;font-weight:500;">➕ 预约新的评审</span>
      <span style="color:var(--text3);font-size:18px;">›</span>
    </a>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" onclick="switchTab('upcoming')">即将到来 <span class="badge" id="badgeUp">0</span></div>
    <div class="tab-item" onclick="switchTab('past')">已结束 <span class="badge" id="badgePast">0</span></div>
    <div class="tab-item" onclick="switchTab('all')">全部 <span class="badge" id="badgeAll">0</span></div>
  </div>
  <div id="meetingsList"></div>
</div>

<script>
const API = location.hostname === 'localhost' ? '' : 'https://veterans-affecting-markets-rica.trycloudflare.com';
const DEMO_MODE = false;
let allMeetings = [];
let currentTab = 'upcoming';

document.addEventListener('DOMContentLoaded', loadMeetings);

async function loadMeetings() {
  document.getElementById('meetingsList').innerHTML = '<div class="loading">加载中...</div>';
  if (DEMO_MODE) {
    allMeetings = [
      {key:'demo1',meeting_id:'',meeting_code:'123-456-789',subject:'4/21 周一 产品设计评审',review_type:'产品设计评审',start_time:'2026-04-21T15:00:00+08:00',end_time:'2026-04-21T16:00:00+08:00',source:'manual',status:'scheduled',archived:false,stories:[],story_count:0,created_at:'2026-04-20T10:00:00'},
      {key:'demo2',meeting_id:'',meeting_code:'987-654-321',subject:'4/22 周二 纯产品评审',review_type:'纯产品评审',start_time:'2026-04-22T15:00:00+08:00',end_time:'2026-04-22T16:00:00+08:00',source:'manual',status:'scheduled',archived:false,stories:[],story_count:0,created_at:'2026-04-20T10:00:00'},
      {key:'demo3',meeting_id:'',meeting_code:'555-666-777',subject:'4/17 周四 产品设计评审',review_type:'产品设计评审',start_time:'2026-04-17T15:00:00+08:00',end_time:'2026-04-17T16:00:00+08:00',source:'manual',status:'archived',archived:true,stories:[{name:'示例需求A',creator:'Jamie'}],story_count:1,created_at:'2026-04-15T10:00:00'},
    ];
    renderList();
    return;
  }
  try {
    const resp = await fetch(`${API}/api/meetings`);
    const data = await resp.json();
    if (data.success) {
      allMeetings = data.meetings;
      renderList();
    } else {
      document.getElementById('meetingsList').innerHTML = '<div class="empty-state"><div class="icon">😵</div>加载失败</div>';
    }
  } catch(e) {
    document.getElementById('meetingsList').innerHTML = '<div class="empty-state"><div class="icon">📡</div>无法连接服务</div>';
  }
}

function renderList() {
  let filtered = allMeetings.filter(m => m.status !== 'cancelled');
  if (currentTab === 'upcoming') filtered = filtered.filter(m => m.status === 'scheduled' || m.status === 'ongoing');
  else if (currentTab === 'past') filtered = filtered.filter(m => m.status === 'ended' || m.status === 'archived');

  const upCount = allMeetings.filter(m => m.status === 'scheduled' || m.status === 'ongoing').length;
  const pastCount = allMeetings.filter(m => m.status === 'ended' || m.status === 'archived').length;
  document.getElementById('badgeUp').textContent = upCount;
  document.getElementById('badgePast').textContent = pastCount;
  document.getElementById('badgeAll').textContent = allMeetings.filter(m => m.status !== 'cancelled').length;

  if (filtered.length === 0) {
    document.getElementById('meetingsList').innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>${currentTab==='upcoming'?'暂无即将到来的评审':'暂无记录'}</div></div>`;
    return;
  }

  let html = '';
  for (const m of filtered) {
    const statusTag = {scheduled:'tag-scheduled',ongoing:'tag-scheduled',ended:'tag-ended',archived:'tag-archived',cancelled:'tag-cancelled'}[m.status] || '';
    const statusText = {scheduled:'待开始',ongoing:'进行中',ended:'待归档',archived:'已归档',cancelled:'已取消'}[m.status] || '';

    // 解析时间
    let dateLabel = '', timeLabel = '';
    try {
      const d = new Date(m.start_time);
      const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
      dateLabel = `${d.getMonth()+1}/${d.getDate()} ${weekdays[d.getDay()]}`;
      const ed = new Date(m.end_time);
      timeLabel = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}-${String(ed.getHours()).padStart(2,'0')}:${String(ed.getMinutes()).padStart(2,'0')}`;
    } catch(e) {}

    html += `<div class="meeting-card ${m.status}">
      <div class="title">${esc(m.subject)}</div>
      <div class="meta">
        <span>📅 ${dateLabel} ${timeLabel}</span>
        <span>🏷️ ${esc(m.review_type)}</span>
        ${m.meeting_code ? `<span>📞 ${esc(m.meeting_code)}</span>` : ''}
      </div>
      <span class="tag ${statusTag}">${statusText}</span>
      ${m.story_count > 0 ? `<span class="tag tag-scheduled" style="margin-left:6px;">${m.story_count}条需求</span>` : ''}

      ${m.stories && m.stories.length > 0 ? `<div class="story-list">
        ${m.stories.map((s,i) => `<div class="story-item">
          <span>${i+1}.</span>
          <span class="name">${esc(s.name)}</span>
          ${s.creator ? `<span>· ${esc(s.creator)}</span>` : ''}
          ${s.duration ? `<span>· ${esc(s.duration)}分钟</span>` : ''}
        </div>`).join('')}
      </div>` : ''}

      ${m.status === 'scheduled' ? `<div class="actions">
        <a class="btn btn-primary btn-sm" href="review-app-v2.html?meeting=${m.key}">📝 报名本场</a>
        <button class="btn btn-outline btn-sm" onclick="editMeeting('${m.key}')">✏️ 修改时间</button>
        <button class="btn btn-danger btn-sm" onclick="confirmCancelMeeting('${m.key}','${esc(m.subject)}')">取消会议</button>
      </div>` : ''}
      ${m.status === 'ended' ? `<div class="actions">
        <span style="font-size:12px;color:var(--warning);">⏳ 等待归档</span>
      </div>` : ''}
    </div>`;
  }
  document.getElementById('meetingsList').innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach((el,i) => {
    el.classList.toggle('active', ['upcoming','past','all'][i] === tab);
  });
  renderList();
}

function editMeeting(key) {
  const m = allMeetings.find(x => x.key === key);
  if (!m) return;

  let startDate = '', startTime = '15:00', endTime = '16:00';
  try {
    const d = new Date(m.start_time);
    startDate = d.toISOString().split('T')[0];
    startTime = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const ed = new Date(m.end_time);
    endTime = `${String(ed.getHours()).padStart(2,'0')}:${String(ed.getMinutes()).padStart(2,'0')}`;
  } catch(e) {}

  const overlay = document.createElement('div');
  overlay.className = 'edit-overlay';
  overlay.innerHTML = `<div class="edit-sheet">
    <div class="title">✏️ 修改会议时间</div>
    <div style="font-size:14px;font-weight:500;margin-bottom:12px;">${esc(m.subject)}</div>
    <div class="form-group"><label class="form-label">日期</label><input type="date" id="editDate" value="${startDate}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">开始时间</label><input type="time" id="editStart" value="${startTime}"></div>
      <div class="form-group"><label class="form-label">结束时间</label><input type="time" id="editEnd" value="${endTime}"></div>
    </div>
    <div class="btns">
      <button class="btn btn-outline" onclick="this.closest('.edit-overlay').remove()">取消</button>
      <button class="btn btn-primary" onclick="saveEditMeeting('${key}')">保存修改</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function saveEditMeeting(key) {
  const date = document.getElementById('editDate').value;
  const start = document.getElementById('editStart').value;
  const end = document.getElementById('editEnd').value;
  if (!date) { showToast('请选择日期'); return; }

  try {
    const resp = await fetch(`${API}/api/meeting/update`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        key,
        start_time: `${date}T${start}:00+08:00`,
        end_time: `${date}T${end}:00+08:00`
      })
    });
    const data = await resp.json();
    if (data.success) {
      document.querySelector('.edit-overlay')?.remove();
      showToast('✅ 已修改');
      loadMeetings();
    } else {
      showToast('❌ ' + (data.error || '修改失败'));
    }
  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

function confirmCancelMeeting(key, name) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `<div class="confirm-box">
    <div class="title">确认取消？</div>
    <div class="msg">将取消「${name}」及所有相关报名</div>
    <div class="btns">
      <button class="btn btn-outline" onclick="this.closest('.confirm-overlay').remove()">再想想</button>
      <button class="btn btn-primary" style="background:var(--danger);" onclick="doCancelMeeting('${key}',this)">确认取消</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function doCancelMeeting(key, btn) {
  btn.disabled = true; btn.textContent = '取消中...';
  try {
    const resp = await fetch(`${API}/api/meeting/cancel`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ key })
    });
    const data = await resp.json();
    document.querySelector('.confirm-overlay')?.remove();
    if (data.success) {
      showToast('✅ 会议已取消');
      loadMeetings();
    } else {
      showToast('❌ ' + (data.error || '取消失败'));
    }
  } catch(e) {
    document.querySelector('.confirm-overlay')?.remove();
    showToast('❌ ' + e.message);
  }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// === 预约弹窗 ===
let scheduleType = '产品设计评审';
let scheduleMode = 'single';

function openScheduleDialog() {
  document.getElementById('scheduleOverlay').style.display = 'flex';
  // 默认日期为明天
  const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
  document.getElementById('schDate').value = tmr.toISOString().split('T')[0];
  document.getElementById('schImportDate').value = tmr.toISOString().split('T')[0];
}

function closeScheduleDialog() {
  document.getElementById('scheduleOverlay').style.display = 'none';
  document.getElementById('schResult').className = 'hidden';
}

function switchSchMode(mode) {
  scheduleMode = mode;
  document.querySelectorAll('.sch-mode-tab').forEach((el,i) => el.classList.toggle('active', (mode==='single'?0:1)===i));
  document.getElementById('schSingleMode').classList.toggle('hidden', mode!=='single');
  document.getElementById('schImportMode').classList.toggle('hidden', mode!=='import');
  document.getElementById('schResult').className = 'hidden';
  // 同步评审类型选中状态到两个 tab
  document.querySelectorAll('.sch-radio').forEach(el => {
    const val = el.textContent.includes('产品设计') ? '产品设计评审' : '纯产品评审';
    el.classList.toggle('active', val === scheduleType);
  });
}

function selectSchType(el, val, group) {
  document.querySelectorAll('#'+group+' .sch-radio').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  scheduleType = val;
}

async function doCreateMeeting() {
  const date = document.getElementById('schDate').value;
  const start = document.getElementById('schStart').value;
  const end = document.getElementById('schEnd').value;

  if (!date) { showToast('请选择日期'); return; }

  // 自动拼接名称：M/D 产品设计评审
  const d = new Date(date + 'T00:00:00');
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const subject = `${d.getMonth()+1}/${d.getDate()} ${weekdays[d.getDay()]} ${scheduleType}`;

  const btn = document.getElementById('schCreateBtn');
  btn.disabled = true; btn.textContent = '创建中，正在预约腾讯会议...';

  try {
    const resp = await fetch(`${API}/api/meeting/create`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        subject, review_type: scheduleType,
        start_time: `${date}T${start}:00+08:00`,
        end_time: `${date}T${end}:00+08:00`,
        source: 'manual'
      })
    });
    const data = await resp.json();
    if (data.success) {
      const m = data.meeting || {};
      let msg = `✅ 评审已创建：${subject}`;
      if (m.meeting_code) msg += `\n📞 会议号：${m.meeting_code}`;
      if (data.warning) msg += `\n⚠️ ${data.warning}`;
      showSchResult(true, msg);
      setTimeout(() => { closeScheduleDialog(); loadMeetings(); }, 2000);
    } else {
      showSchResult(false, '❌ ' + (data.error||'创建失败'));
    }
  } catch(e) { showSchResult(false, '❌ '+e.message); }
  finally { btn.disabled = false; btn.textContent = '创建评审'; }
}

async function doImportMeeting() {
  const code = document.getElementById('schImportCode').value.trim();
  if (!code) { showToast('请输入会议号'); return; }

  const btn = document.getElementById('schImportBtn');
  btn.disabled = true; btn.textContent = '正在读取会议信息...';

  try {
    const resp = await fetch(`${API}/api/meeting/import`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ meeting_code: code })
    });
    const data = await resp.json();
    if (data.success) {
      const m = data.meeting || {};
      let msg = `✅ 导入成功`;
      if (m.subject) msg += `\n📌 ${m.subject}`;
      if (m.meeting_code) msg += `\n📞 会议号：${m.meeting_code}`;
      if (m.start_time) {
        try {
          const d = new Date(m.start_time);
          const ed = new Date(m.end_time);
          msg += `\n📅 ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}-${String(ed.getHours()).padStart(2,'0')}:${String(ed.getMinutes()).padStart(2,'0')}`;
        } catch(e) {}
      }
      showSchResult(true, msg);
      setTimeout(() => { closeScheduleDialog(); loadMeetings(); }, 2000);
    } else {
      showSchResult(false, '❌ ' + (data.error||'导入失败'));
    }
  } catch(e) { showSchResult(false, '❌ '+e.message); }
  finally { btn.disabled = false; btn.textContent = '导入并创建评审'; }
}

function showSchResult(ok, text) {
  const r = document.getElementById('schResult');
  r.className = ok ? 'sch-result success' : 'sch-result error';
  r.innerHTML = text.replace(/\n/g, '<br>');
}
</script>

<!-- 预约弹窗 -->
<style>
.sch-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; }
.sch-sheet { background:#fff; border-radius:14px; padding:20px; width:90%; max-width:420px; max-height:85vh; overflow-y:auto; }
.sch-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.sch-header h2 { font-size:17px; font-weight:600; }
.sch-close { width:28px; height:28px; border:none; background:#f0f0f0; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.sch-mode-tabs { display:flex; border-radius:8px; overflow:hidden; border:1px solid var(--border); margin-bottom:16px; }
.sch-mode-tab { flex:1; padding:9px; text-align:center; font-size:13px; font-weight:500; background:#fafafa; color:var(--text2); border:none; cursor:pointer; }
.sch-mode-tab.active { background:var(--primary); color:#fff; }
.sch-mode-tab:not(:last-child) { border-right:1px solid var(--border); }
.sch-group { margin-bottom:14px; }
.sch-label { font-size:13px; font-weight:500; color:var(--text2); margin-bottom:6px; display:block; }
.sch-label .req { color:var(--danger); }
.sch-input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fafafa; outline:none; }
.sch-input:focus { border-color:var(--primary); background:#fff; }
.sch-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.sch-radios { display:flex; gap:8px; }
.sch-radio { flex:1; padding:9px 6px; border:1.5px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-size:13px; background:#fafafa; transition:all .2s; }
.sch-radio.active { border-color:var(--primary); background:var(--primary-light); color:var(--primary); font-weight:500; }
.sch-hint { font-size:11px; color:var(--text3); margin-top:4px; }
.sch-btn { width:100%; padding:13px; border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; background:var(--primary); color:#fff; margin-top:4px; }
.sch-btn:disabled { background:#bbb; cursor:not-allowed; }
.sch-result { padding:10px 14px; border-radius:8px; font-size:13px; margin-top:10px; }
.sch-result.success { background:var(--success-bg); color:var(--success); }
.sch-result.error { background:var(--danger-bg); color:var(--danger); }
.hidden { display:none !important; }
</style>

<div class="sch-overlay" id="scheduleOverlay">
  <div class="sch-sheet">
    <div class="sch-header">
      <h2>➕ 预约新的评审</h2>
      <button class="sch-close" onclick="closeScheduleDialog()">✕</button>
    </div>

    <div class="sch-mode-tabs">
      <div class="sch-mode-tab active" onclick="switchSchMode('single')">创建评审</div>
      <div class="sch-mode-tab" onclick="switchSchMode('import')">导入已有会议</div>
    </div>

    <!-- 创建评审 -->
    <div id="schSingleMode">
      <div class="sch-group">
        <label class="sch-label">评审类型 <span class="req">*</span></label>
        <div class="sch-radios" id="schTypeGroup">
          <div class="sch-radio active" onclick="selectSchType(this,'产品设计评审','schTypeGroup')">🎨 产品设计评审</div>
          <div class="sch-radio" onclick="selectSchType(this,'纯产品评审','schTypeGroup')">📋 纯产品评审</div>
        </div>
      </div>
      <div class="sch-group">
        <label class="sch-label">日期 <span class="req">*</span></label>
        <input class="sch-input" type="date" id="schDate">
      </div>
      <div class="sch-row">
        <div class="sch-group"><label class="sch-label">开始</label><input class="sch-input" type="time" id="schStart" value="15:00"></div>
        <div class="sch-group"><label class="sch-label">结束</label><input class="sch-input" type="time" id="schEnd" value="16:00"></div>
      </div>
      <button class="sch-btn" id="schCreateBtn" onclick="doCreateMeeting()">创建评审</button>
    </div>

    <!-- 导入已有会议 -->
    <div id="schImportMode" class="hidden">
      <div class="sch-group">
        <label class="sch-label">腾讯会议号 <span class="req">*</span></label>
        <input class="sch-input" type="text" id="schImportCode" placeholder="输入会议号，如 123-456-789">
        <div class="sch-hint">输入会议号后自动读取会议名称和时间</div>
      </div>
      <button class="sch-btn" id="schImportBtn" onclick="doImportMeeting()">导入并创建评审</button>
    </div>

    <div id="schResult" class="hidden"></div>
  </div>
</div>

</body>
</html>
